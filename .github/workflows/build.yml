name: Build MIDI Synthesizer

on:
  push:
    branches: [main, "claude/**"]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t rc2014-build .

      - name: Compile with z88dk
        run: |
          # The z88dk image lacks 'make', so we call 'zcc' directly.
          # Match the filenames and flags exactly with the Makefile.
          docker run --rm -v "$(pwd):/src" -w /src z88dk/z88dk \
            zcc +cpm -v -SO3 -O3 --opt-code-size -Iinclude \
            src/main.c src/core/*.c src/midi/*.c src/chips/*.c \
            -create-app -o midisynth

          mkdir -p dist
          # Find the compiled binary regardless of case and copy it
          # z88dk on Linux typically produces lowercase 'midisynth.com'
          COM_FILE=$(find . -maxdepth 1 -iname "midisynth.com" | head -n 1)
          if [ -z "$COM_FILE" ]; then
            echo "Error: midisynth.com not found after compilation"
            ls -la
            exit 1
          fi

          echo "Found compiled binary: $COM_FILE"
          cp "$COM_FILE" dist/MIDISYNTH.COM

          # Ensure root has MIDISYNTH.COM for subsequent steps (avoiding self-copy)
          if [[ "$COM_FILE" != *"MIDISYNTH.COM"* ]]; then
            cp "$COM_FILE" MIDISYNTH.COM
          fi

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: midisynth-builds
          path: dist/

      - name: E2E test
        run: |
          # Ensure we start with a fresh disk image. Use build_docker.sh
          # to populate it with the pre-compiled binary, then run the
          # E2E script inside the container to ensure MAME and other
          # tools are available.
          rm -f cheese.img
          HD_IMAGE="cheese.img" BUILD_IMAGE=rc2014-build ./build_docker.sh image
          docker run --rm \
            -v "$(pwd):/workspace" -w /workspace \
            -e BOOT_TIMEOUT=180 -e CMD_TIMEOUT=60 \
            rc2014-build \
            ./tests/e2e/run_e2e.sh --no-build --headless
        timeout-minutes: 10

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-test-results
          path: |
            tests/e2e/results/test_result.txt
            tests/e2e/results/serial_io.log
            tests/e2e/results/mame.log
            tests/e2e/results/audio.wav
